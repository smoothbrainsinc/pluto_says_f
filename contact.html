<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | [Company Name] - Hesperia Construction Experts</title>
    <meta name="description" content="Professional construction services in Hesperia including remodels, repairs, and custom home improvements.">
    
    <!-- Favicons -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/contact_styles.css">

</head>
<body>
<h1>COMING SOON</h1>
<script>
  // Fetch and insert the navbar from navbar.html into the placeholder div
  fetch('navbar.html')
    .then(response => {
      if (!response.ok) {
        throw new Error('Network response was not ok ' + response.statusText);
      }
      return response.text();
    })
    .then(html => {
      document.getElementById('navbar-placeholder').innerHTML = html;
    })
    .catch(error => {
      console.error('Error loading navbar:', error);
    });
</script>
</body>
</html>
