<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" >
    <title>Our Services | [Company Name] - Hesperia Construction Experts</title>
    <meta name="description" content="Professional construction services in Hesperia including remodels, repairs, and custom home improvements.">
    
    <!-- Favicons -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/contact_styles.css">

</head>
<body>
<h1>COMING SOON</h1>
<script>
fetch('navbar.html')
  .then(response => {
    if (!response.ok) throw new Error('Failed to load navbar: ' + response.statusText);
    return response.text();
  })
  .then(html => {
    const placeholder = document.getElementById('navbar-placeholder');
    placeholder.innerHTML = html;

    // Run any scripts in the loaded navbar
    placeholder.querySelectorAll("script").forEach(oldScript => {
      const newScript = document.createElement("script");
      if (oldScript.src) {
        newScript.src = oldScript.src;
      } else {
        newScript.textContent = oldScript.textContent;
      }
      document.body.appendChild(newScript);
    });
  })
  .catch(error => console.error(error));
</script>

</body>
</html>
